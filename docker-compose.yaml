services:

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: fastapi
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/healthcheck"]
      interval: 3s
      timeout: 2s
      retries: 3
      start_period: 3s
    networks:
      - orbit-network
    
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - local_postgres_data:/var/lib/postgresql/data:Z
    networks:
      - orbit-network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 5s
      timeout: 30s
      retries: 24
      start_period: 30s
      


  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: nextjs
    ports:
      - "8081:8081"
    env_file:
      - .env
    networks:
      - orbit-network
    
    depends_on:
      backend:
        condition: service_healthy
    environment:
     - BACKEND_URL=http://backend:8080
    

networks:
  orbit-network:
    driver: bridge

volumes:
  local_postgres_data: {}
